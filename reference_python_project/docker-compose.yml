# ══════════════════════════════════════════════════════════════════════════════
#  POLYMARKET — by Genoshide | polymarket arbitrage script bot
#  docker-compose.yml
#
#  Quick start:
#    make docker-build          Build the image
#    make docker-paper          Run in paper (simulation) mode (foreground)
#    make docker-up             Run paper mode in background (daemon)
#    make docker-live           Run in live mode (5-second abort window)
#    make docker-logs           Tail container logs
#    make docker-health         Run health check inside container
#    make docker-stop           Stop the container
#
#  Manual usage:
#    docker compose run --rm bot              uses PAPER_MODE from .env
#    docker compose run --rm bot --paper      force paper mode
#    docker compose run --rm bot --live       force live mode
#    docker compose up -d                     daemon mode (no dashboard)
#    docker compose down                      stop + remove container
# ══════════════════════════════════════════════════════════════════════════════

services:

  bot:
    image: polymarket-bot:latest
    build:
      context: .
      dockerfile: Dockerfile
      # Cache-busting tag: rebuild when requirements.txt changes
      labels:
        - "com.polymarket.version=1.0.0"

    container_name: polymarket-bot

    restart: "no"           # Change to "unless-stopped" for always-on daemon mode

    # ── Runtime environment ──────────────────────────────────────────────────
    # All secrets come from .env — NEVER hardcode credentials here.
    # .env is listed in .gitignore and .dockerignore.
    env_file:
      - path: .env
        required: true

    # Override specific vars for the container environment
    environment:
      # Redirect logs to the mounted volume directory
      LOG_FILE: /app/logs/polymarket_bot.log

    # ── Volumes ──────────────────────────────────────────────────────────────
    volumes:
      # Persist log files on the host so you can tail them with:
      #   tail -f ./logs/polymarket_bot.log
      - ./logs:/app/logs

    # ── Signal / shutdown ────────────────────────────────────────────────────
    # tini (in the Dockerfile ENTRYPOINT) forwards SIGTERM to Python so
    # the bot's asyncio loop can shut down cleanly within the stop grace period.
    stop_grace_period: 15s

    # ── Resource limits ──────────────────────────────────────────────────────
    # Bot is lightweight: ~100MB RAM, minimal CPU in steady state.
    # Remove or adjust these limits if running on a constrained machine.
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

    # ── Health check ─────────────────────────────────────────────────────────
    # Docker will mark the container "healthy" once healthcheck.py exits 0.
    # The bot starts trading only after this passes.
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 30s


# ── Named volumes (declared here for docker compose v2 compatibility) ─────────
# Uncomment if you want docker-managed volumes instead of bind mounts:
# volumes:
#   bot-logs:
